<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apex PodPlay Helper</title>
<meta name="description" content="Browse and book every Apex Pickleball Clubs session — open play, clinics, and socials — filtered by level, type, day, and time.">
<style>
  :root{
    --ink:#101725; --ink-soft:#26324a; --muted:#5b6b82; --muted-2:#8a97ab;
    --paper:#f4f6fa; --card:#ffffff; --hair:#e3e8f1; --hair-2:#eef1f7;
    --brand:#2457d6; --lime:#c7e63f;
    --c-open:#2563c9; --c-clinic:#c6741b; --c-social:#0e8c7f; --c-special:#6d3be0;
    --c-open-b:#eaf1fd; --c-clinic-b:#fbf0e2; --c-social-b:#e6f5f2; --c-special-b:#f0ebfc;
    --full:#b03636; --shadow:0 1px 2px rgba(16,23,37,.06),0 8px 24px rgba(16,23,37,.06);
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .wrap{max-width:1200px;margin:0 auto;padding:0 20px 72px}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

  /* header */
  header.hero{background:var(--ink);color:#fff;border-bottom:3px solid var(--lime)}
  .hero-in{max-width:1200px;margin:0 auto;padding:32px 20px 28px;
    display:flex;flex-wrap:wrap;gap:26px 40px;align-items:flex-end;justify-content:space-between}
  .eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    color:var(--lime);display:flex;align-items:center;gap:9px}
  .eyebrow .dot{width:9px;height:9px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 4px rgba(199,230,63,.18)}
  h1{font-size:clamp(28px,4.2vw,44px);line-height:1.03;letter-spacing:-.03em;font-weight:800;
    margin:12px 0 0;text-wrap:balance;max-width:18ch}
  .sub{color:#aeb9cc;margin:11px 0 0;max-width:58ch;font-size:14.5px}
  .sub b{color:#e7ecf5;font-weight:600}
  .snap{margin-top:8px;font-size:11.5px;color:#7c8aa2;letter-spacing:.02em}
  .legend{display:flex;flex-direction:column;gap:11px;min-width:190px}
  .legend .lrow{display:flex;align-items:center;gap:10px;font-size:13px;color:#c8d1e0}
  .legend .sw{width:13px;height:13px;border-radius:4px;flex:none}

  /* loading / error */
  .state{max-width:1200px;margin:0 auto;padding:80px 20px;text-align:center;color:var(--muted)}
  .state b{display:block;color:var(--ink);font-size:18px;font-weight:700;margin-bottom:8px}
  .state a{color:var(--brand);font-weight:600;cursor:pointer}
  .spinner{width:26px;height:26px;border:3px solid var(--hair);border-top-color:var(--brand);
    border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(prefers-reduced-motion:reduce){.spinner{animation:none}}

  /* controls */
  .controls{position:sticky;top:0;z-index:30;background:rgba(244,246,250,.9);
    backdrop-filter:saturate(160%) blur(10px);border-bottom:1px solid var(--hair);margin-bottom:22px}
  .controls-in{max-width:1200px;margin:0 auto;padding:11px 20px;display:flex;flex-direction:column;gap:11px}
  .crow{display:flex;flex-wrap:wrap;gap:11px 16px;align-items:center}
  .crow2{border-top:1px solid var(--hair-2);padding-top:11px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1px solid var(--hair);background:var(--card);color:var(--ink-soft);
    padding:7px 13px 7px 11px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:7px;line-height:1;transition:border-color .15s,background .15s,color .15s,box-shadow .15s}
  .chip .cdot{width:9px;height:9px;border-radius:50%;flex:none}
  .chip .cn{font-variant-numeric:tabular-nums;color:var(--muted-2);font-weight:600}
  .chip[aria-pressed="true"]{color:#fff;border-color:transparent;box-shadow:var(--shadow)}
  .chip[aria-pressed="true"] .cn{color:rgba(255,255,255,.7)}
  .chip.c-openplay[aria-pressed="true"]{background:var(--c-open)}
  .chip.c-clinic[aria-pressed="true"]{background:var(--c-clinic)}
  .chip.c-social[aria-pressed="true"]{background:var(--c-social)}
  .chip.c-special[aria-pressed="true"]{background:var(--c-special)}
  .chip:focus-visible,.iconbtn:focus-visible,.seg button:focus-visible,.ev:focus-visible,.book:focus-visible,
  .dow-btn:focus-visible,.lvl-btn:focus-visible,.reset:focus-visible,.range input:focus-visible::-webkit-slider-thumb{
    outline:2px solid var(--brand);outline-offset:2px}
  .spacer{flex:1 1 30px}
  .fld{display:flex;align-items:center;gap:9px}
  .fld > label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .seg{display:flex;border:1px solid var(--hair);border-radius:8px;overflow:hidden;background:var(--card)}
  .seg button{font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);background:transparent;
    border:0;padding:7px 13px;cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--brand);color:#fff}
  .reset{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:none;border:0;
    cursor:pointer;padding:6px 4px;text-decoration:underline;text-underline-offset:3px}
  .reset:hover{color:var(--brand)}

  /* level + day toggles */
  .lvl-toggle,.dow-toggle{display:flex;gap:5px;flex-wrap:wrap}
  .lvl-btn{height:30px;padding:0 11px;border-radius:8px;border:1px solid var(--hair);background:var(--card);
    color:var(--muted);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;
    transition:background .15s,border-color .15s,color .15s}
  .dow-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--hair);background:var(--card);
    color:var(--muted);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;
    transition:background .15s,border-color .15s,color .15s}
  .lvl-btn[aria-pressed="true"],.dow-btn[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:transparent}
  .lvl-btn:hover,.dow-btn:hover{border-color:var(--brand)}

  /* time range slider */
  .time-fld{gap:12px}
  .range{position:relative;width:210px;height:30px;flex:none}
  .range-track,.range-fill{position:absolute;top:50%;transform:translateY(-50%);height:4px;border-radius:2px}
  .range-track{left:0;right:0;background:var(--hair)}
  .range-fill{background:var(--brand)}
  .range input{position:absolute;top:50%;transform:translateY(-50%);left:0;width:100%;height:18px;margin:0;
    background:none;pointer-events:none;-webkit-appearance:none;appearance:none}
  .range input::-webkit-slider-runnable-track{background:none;border:none}
  .range input::-moz-range-track{background:none;border:none}
  .range input::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:auto;width:17px;height:17px;
    border-radius:50%;background:#fff;border:2px solid var(--brand);box-shadow:var(--shadow);cursor:pointer}
  .range input::-moz-range-thumb{pointer-events:auto;width:17px;height:17px;border-radius:50%;
    background:#fff;border:2px solid var(--brand);box-shadow:var(--shadow);cursor:pointer}
  .time-label{font-size:13px;font-weight:700;color:var(--ink-soft);min-width:132px}

  /* month nav */
  .monthbar{display:flex;align-items:center;gap:14px;margin:2px 0 16px}
  .monthbar h2{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:0}
  .iconbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--hair);background:var(--card);
    color:var(--ink-soft);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;
    justify-content:center;transition:background .15s,border-color .15s}
  .iconbtn:hover:not(:disabled){border-color:var(--brand);color:var(--brand)}
  .iconbtn:disabled{opacity:.35;cursor:default}
  .mcount{color:var(--muted);font-size:13px;font-weight:600}

  /* month grid */
  .grid{background:var(--card);border:1px solid var(--hair);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);background:#fbfcfe;border-bottom:1px solid var(--hair)}
  .dow div{padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .weeks{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));overflow:hidden}
  .cell{min-width:0;min-height:132px;border-right:1px solid var(--hair-2);border-bottom:1px solid var(--hair-2);
    padding:8px 8px 10px;display:flex;flex-direction:column;gap:5px}
  .cell:nth-child(7n){border-right:0}
  .cell.out{background:#fafbfd}
  .cell.today{background:#f3f7ff}
  .dnum{font-size:12.5px;font-weight:700;color:var(--ink-soft);align-self:flex-start;font-variant-numeric:tabular-nums;
    display:flex;align-items:center;gap:6px}
  .cell.out .dnum{color:var(--muted-2)}
  .cell.today .dnum .tpill{background:var(--brand);color:#fff;border-radius:999px;padding:1px 7px;font-size:11px}
  .ev{border:0;text-align:left;width:100%;min-width:0;cursor:pointer;font-family:inherit;border-radius:6px;
    padding:4px 7px;font-size:11.5px;line-height:1.25;display:flex;flex-direction:column;gap:1px;
    border-left:3px solid;background:#f5f7fa;overflow:hidden}
  .ev .et{font-weight:700;font-variant-numeric:tabular-nums}
  .ev .en{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-soft);font-weight:500}
  .ev.full{opacity:.62}
  .ev.full .et::after{content:" \00B7 Full";color:var(--full);font-weight:700}
  .ev.wl .et::after{content:" \00B7 Waitlist";color:var(--c-clinic);font-weight:700}
  .cat-openplay{border-left-color:var(--c-open);background:var(--c-open-b)}
  .cat-clinic{border-left-color:var(--c-clinic);background:var(--c-clinic-b)}
  .cat-social{border-left-color:var(--c-social);background:var(--c-social-b)}
  .cat-special{border-left-color:var(--c-special);background:var(--c-special-b)}
  .cat-openplay .et{color:var(--c-open)} .cat-clinic .et{color:var(--c-clinic)}
  .cat-social .et{color:var(--c-social)} .cat-special .et{color:var(--c-special)}
  .more{font-size:11px;font-weight:700;color:var(--muted);background:none;border:0;cursor:pointer;padding:2px 4px;align-self:flex-start}
  .more:hover{color:var(--brand)}

  /* list */
  .list{display:none;flex-direction:column;gap:26px}
  .daygrp{background:var(--card);border:1px solid var(--hair);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .dayhd{display:flex;align-items:baseline;gap:12px;padding:14px 18px;border-bottom:1px solid var(--hair-2);background:#fbfcfe}
  .dayhd .dd{font-size:16px;font-weight:800;letter-spacing:-.01em}
  .dayhd .dw{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .dayhd .dc{margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:600}
  .rows{display:flex;flex-direction:column}
  .row{display:grid;grid-template-columns:132px 1fr auto;gap:16px;align-items:center;padding:13px 18px;
    border-bottom:1px solid var(--hair-2);border-left:4px solid;cursor:pointer}
  .row:last-child{border-bottom:0}
  .row:hover{background:#fafbfe}
  .row .rtime{font-weight:700;font-variant-numeric:tabular-nums;font-size:13.5px}
  .row .rtime span{display:block;font-weight:600;color:var(--muted);font-size:12px}
  .row .rname{font-weight:600}
  .row .rmeta{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:4px 12px}
  .row .rright{text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
  .row.cat-openplay{border-left-color:var(--c-open)} .row.cat-clinic{border-left-color:var(--c-clinic)}
  .row.cat-social{border-left-color:var(--c-social)} .row.cat-special{border-left-color:var(--c-special)}
  .badge{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
  .b-openplay{background:var(--c-open-b);color:var(--c-open)} .b-clinic{background:var(--c-clinic-b);color:var(--c-clinic)}
  .b-social{background:var(--c-social-b);color:var(--c-social)} .b-special{background:var(--c-special-b);color:var(--c-special)}
  .price{font-weight:700;font-variant-numeric:tabular-nums;font-size:14px}
  .spots{font-size:12px;font-weight:600;color:var(--c-social)}
  .spots.low{color:var(--c-clinic)} .spots.none{color:var(--full)}
  .empty{padding:60px 20px;text-align:center;color:var(--muted)}
  .empty b{color:var(--ink);font-weight:700;display:block;font-size:17px;margin-bottom:6px}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(16,23,37,.5);backdrop-filter:blur(2px);display:none;
    align-items:center;justify-content:center;z-index:100;padding:20px}
  .scrim.open{display:flex}
  .sheet{background:var(--card);border-radius:16px;max-width:440px;width:100%;
    box-shadow:0 24px 64px rgba(16,23,37,.32);overflow:hidden;animation:pop .18s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.sheet{animation:none}}
  .sheet .top{padding:20px 22px 18px;border-bottom:1px solid var(--hair-2)}
  .sheet .cat{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .sheet h3{margin:8px 0 0;font-size:21px;font-weight:800;letter-spacing:-.02em;text-wrap:balance}
  .sheet .when{margin-top:6px;color:var(--ink-soft);font-weight:600;font-variant-numeric:tabular-nums}
  .sheet .body{padding:6px 22px 4px}
  .drow{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--hair-2);font-size:14px}
  .drow:last-child{border-bottom:0}
  .drow .k{width:96px;flex:none;color:var(--muted);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding-top:2px}
  .drow .v{color:var(--ink);font-weight:500}
  .drow .v .hint{color:var(--muted);font-weight:500}
  .sheet .foot{padding:16px 22px 20px;display:flex;gap:10px;align-items:center}
  .book{flex:1;background:var(--brand);color:#fff;text-decoration:none;text-align:center;font-weight:700;font-size:15px;
    padding:12px 16px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
  .book:hover{background:#1c47b4}
  .close{width:40px;height:40px;border-radius:10px;border:1px solid var(--hair);background:var(--card);cursor:pointer;
    font-size:20px;color:var(--muted);flex:none}
  .close:hover{border-color:var(--full);color:var(--full)}
  .note{font-size:11.5px;color:var(--muted-2);text-align:center;padding:0 22px 18px}

  @media(max-width:720px){
    .weeks .en{display:none}
    .ev{padding:3px 5px}
    .row{grid-template-columns:96px 1fr;gap:10px}
    .row .rright{grid-column:1 / -1;flex-direction:row;justify-content:space-between;align-items:center}
    .legend{min-width:0}
  }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-in">
    <div>
      <div class="eyebrow"><span class="dot"></span>Apex Pickleball Clubs &middot; Cedar Park, TX</div>
      <h1>Open Play, Clinics &amp; Socials</h1>
      <p class="sub">Browse every listed session at Apex and book straight on PodPlay. Filter by <b>level</b>, <b>type</b>, <b>day</b>, and <b>start time</b> &mdash; your filters are saved on this device.</p>
      <p class="snap" id="snap"></p>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</header>

<div class="state" id="loading"><div class="spinner"></div>Loading sessions&hellip;</div>
<div class="state" id="error" hidden></div>

<div id="app" hidden>
  <div class="controls">
    <div class="controls-in">
      <div class="crow">
        <div class="chips" id="typeChips"></div>
        <div class="spacer"></div>
        <div class="seg" role="group" aria-label="View">
          <button id="v-month" aria-pressed="true">Month</button>
          <button id="v-list" aria-pressed="false">List</button>
        </div>
      </div>
      <div class="crow crow2">
        <div class="fld">
          <label>Level</label>
          <div class="lvl-toggle" id="lvlChips" role="group" aria-label="Skill level"></div>
        </div>
        <div class="spacer"></div>
        <div class="fld">
          <label>Days</label>
          <div class="dow-toggle" id="dowToggle" role="group" aria-label="Days of week"></div>
        </div>
      </div>
      <div class="crow crow2">
        <div class="fld time-fld">
          <label>Start time</label>
          <div class="range" id="range">
            <div class="range-track"></div>
            <div class="range-fill" id="rfill"></div>
            <input type="range" id="tmin" aria-label="Earliest start time">
            <input type="range" id="tmax" aria-label="Latest start time">
          </div>
          <span class="time-label num" id="timeLabel"></span>
        </div>
        <div class="spacer"></div>
        <button class="reset" id="reset" type="button">Reset filters</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="monthbar" id="monthbar">
      <button class="iconbtn" id="prev" aria-label="Previous month">&lsaquo;</button>
      <button class="iconbtn" id="next" aria-label="Next month">&rsaquo;</button>
      <h2 id="mlabel"></h2>
      <span class="mcount num" id="mcount"></span>
    </div>
    <div class="grid" id="grid" hidden>
      <div class="dow"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
      <div class="weeks" id="weeks"></div>
    </div>
    <div class="list" id="list"></div>
    <div class="empty" id="empty" hidden></div>
  </div>

  <div class="scrim" id="scrim" role="dialog" aria-modal="true" aria-labelledby="sh-title">
    <div class="sheet" id="sheet"></div>
  </div>
</div>

<script>
"use strict";
const TZ = "America/Chicago";
const BOOK = id => "https://apexpbclubs.podplay.app/community/events/" + id;
const LS_KEY = "apex-podplay-filters";
const LS_V = 1;

const CATS = {
  openplay: {label:"Open Play", color:"var(--c-open)"},
  clinic:   {label:"Clinic",    color:"var(--c-clinic)"},
  social:   {label:"Social",    color:"var(--c-social)"},
  special:  {label:"Special",   color:"var(--c-special)"},
};
const LEVEL_KEYS = ["all",1,2,3,4,5];

function classifyType(e){
  const n=(e.name||"").toLowerCase();
  const tags=e.tags||[];
  if(e.customType==="Clinics" || tags.includes("Clinics")) return "clinic";
  if(/social|ladies/.test(n) || tags.includes("Women")) return "social";
  if(e.customType==="Private Event") return "special";
  return "openplay";
}
function levelsOf(e){
  const set=new Set();
  (e.tags||[]).forEach(t=>{ const m=/^Level\s+(\d)/.exec(t); if(m) set.add(+m[1]); });
  return { levels:[...set], isOpen:(e.tags||[]).includes("All Levels") || set.size===0 };
}

// ---- date helpers (Cedar Park / Central) ----
const fmtCache={};
function fmt(opts){ const k=JSON.stringify(opts); return fmtCache[k] || (fmtCache[k]=new Intl.DateTimeFormat("en-US",{timeZone:TZ,...opts})); }
function partsOf(iso){ const o={}; fmt({year:"numeric",month:"2-digit",day:"2-digit",weekday:"short",hour:"numeric",minute:"2-digit",hour12:true}).formatToParts(new Date(iso)).forEach(p=>o[p.type]=p.value); return o; }
const DOWMAP={Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
function minutesOfDay(iso){ const o={}; fmt({hour:"2-digit",minute:"2-digit",hour12:false}).formatToParts(new Date(iso)).forEach(p=>o[p.type]=p.value); let h=parseInt(o.hour,10); if(h>=24)h-=24; return h*60+parseInt(o.minute,10); }
function dayKey(iso){ const o=partsOf(iso); return o.year+"-"+o.month+"-"+o.day; }
function timeLabel(iso){ const o=partsOf(iso); return o.hour+":"+o.minute+o.dayPeriod.toLowerCase().replace("m",""); }
function timeLabelFull(iso){ const o=partsOf(iso); return o.hour+":"+o.minute+" "+o.dayPeriod; }
function todayKey(){ const o={}; fmt({year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date()).forEach(p=>o[p.type]=p.value); return o.year+"-"+o.month+"-"+o.day; }
function minLabel(m){ let h=Math.floor(m/60), mm=m%60; const ap=h>=12?"PM":"AM"; let hh=h%12; if(hh===0)hh=12; return hh+":"+String(mm).padStart(2,"0")+" "+ap; }
function ratingText(e){ if(e.minRating==null && e.maxRating==null) return "Open"; return (e.minRating!=null?e.minRating:"")+"–"+(e.maxRating!=null?e.maxRating:""); }

// ---- module state, filled by boot() ----
let data=[], TODAY, T_FLOOR, T_CEIL, months=[], state;
let grid,weeks,listEl,emptyEl,mlabel,mcount,monthbar,scrim,sheet,tmin,tmax,rfill,timeLbl,dowToggle,lvlChips,typeChips;

// ---- load ----
fetch("./events.json",{cache:"no-store"})
  .then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
  .then(boot)
  .catch(err=>{
    document.getElementById("loading").hidden=true;
    const e=document.getElementById("error"); e.hidden=false;
    e.innerHTML='<b>Couldn’t load sessions</b>'+String(err.message||err)+'<br><br><a onclick="location.reload()">Try again</a>';
  });

function boot(payload){
  const raw = (payload && payload.events) || [];
  TODAY = todayKey();
  data = raw.map(e=>{
    const lv=levelsOf(e);
    const cap=e.capacity||0, signed=e.signedUp||0;
    return {...e, cat:classifyType(e), levels:lv.levels, isOpen:lv.isOpen,
      dk:dayKey(e.start), mins:minutesOfDay(e.start), dow:DOWMAP[partsOf(e.start).weekday],
      start_ms:new Date(e.start).getTime(),
      spotsLeft: cap ? Math.max(0,cap-signed) : null, full: cap ? signed>=cap : false};
  }).filter(e=>e.dk>=TODAY).sort((a,b)=>a.start_ms-b.start_ms);

  // snapshot line
  const gen = payload && payload.generatedAt;
  const genTxt = gen ? new Date(gen).toLocaleString("en-US",{timeZone:TZ,month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) : "";
  document.getElementById("snap").textContent = data.length
    ? (data.length + " upcoming sessions" + (genTxt?" · updated "+genTxt:"") + " · times in Central (Cedar Park)")
    : "No upcoming sessions found.";

  // time bounds from data
  const mm = data.map(e=>e.mins);
  T_FLOOR = data.length ? Math.floor(Math.min(...mm)/30)*30 : 360;
  T_CEIL  = data.length ? Math.ceil(Math.max(...mm)/30)*30 : 1320;
  if(T_CEIL<=T_FLOOR) T_CEIL=T_FLOOR+30;

  state = {
    types: new Set(Object.keys(CATS)),
    levels: new Set(LEVEL_KEYS),
    days: new Set([0,1,2,3,4,5,6]),
    tMin: T_FLOOR, tMax: T_CEIL,
    view: "month", month: null,
  };
  loadState();

  months = [...new Set(data.map(e=>{const o=partsOf(e.start);return o.year+"-"+o.month;}))].sort();
  if(months.length) setMonth(months[0]);

  cacheEls();
  buildLegend(); buildTypeChips(); buildLevelChips(); buildDow(); initRange(); wire();

  document.getElementById("loading").hidden=true;
  document.getElementById("app").hidden=false;

  if(!data.length){ monthbar.style.display="none"; grid.hidden=true; emptyEl.hidden=false;
    emptyEl.innerHTML="<b>No upcoming sessions</b>Check back later — the club publishes its booking window a few weeks out."; return; }
  render();
}

// ---- persistence ----
function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({
    v:LS_V, types:[...state.types], levels:[...state.levels], days:[...state.days],
    tMin:state.tMin, tMax:state.tMax, view:state.view })); }catch(e){}
}
function loadState(){
  let s; try{ s=JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){ return; }
  if(!s || s.v!==LS_V) return;
  if(Array.isArray(s.types)){ const t=s.types.filter(k=>CATS[k]); if(t.length) state.types=new Set(t); }
  if(Array.isArray(s.levels)){ const ok=new Set(LEVEL_KEYS); const l=s.levels.filter(k=>ok.has(k)); if(l.length) state.levels=new Set(l); }
  if(Array.isArray(s.days)){ const d=s.days.filter(x=>x>=0&&x<=6); if(d.length) state.days=new Set(d); }
  if(typeof s.tMin==="number") state.tMin=Math.min(Math.max(s.tMin,T_FLOOR),T_CEIL);
  if(typeof s.tMax==="number") state.tMax=Math.min(Math.max(s.tMax,T_FLOOR),T_CEIL);
  if(state.tMin>state.tMax){ state.tMin=T_FLOOR; state.tMax=T_CEIL; }
  if(s.view==="list"||s.view==="month") state.view=s.view;
}

// ---- filtering ----
function matchesLevel(e){
  if(e.levels.some(l=>state.levels.has(l))) return true;
  return e.isOpen && state.levels.has("all");
}
function passDayTimeLevel(e){ return matchesLevel(e) && state.days.has(e.dow) && e.mins>=state.tMin && e.mins<=state.tMax; }
function filtered(){ return data.filter(e => state.types.has(e.cat) && passDayTimeLevel(e)); }

function updateCounts(){
  const c={}; Object.keys(CATS).forEach(k=>c[k]=0);
  data.filter(passDayTimeLevel).forEach(e=>c[e.cat]++);
  typeChips.querySelectorAll(".chip").forEach(b=>{
    const k=[...b.classList].find(x=>x.startsWith("c-")).slice(2);
    const cn=b.querySelector(".cn"); if(cn) cn.textContent=c[k];
  });
}

// ---- el cache ----
function cacheEls(){
  grid=document.getElementById("grid"); weeks=document.getElementById("weeks");
  listEl=document.getElementById("list"); emptyEl=document.getElementById("empty");
  mlabel=document.getElementById("mlabel"); mcount=document.getElementById("mcount");
  monthbar=document.getElementById("monthbar"); scrim=document.getElementById("scrim"); sheet=document.getElementById("sheet");
  tmin=document.getElementById("tmin"); tmax=document.getElementById("tmax");
  rfill=document.getElementById("rfill"); timeLbl=document.getElementById("timeLabel");
  dowToggle=document.getElementById("dowToggle"); lvlChips=document.getElementById("lvlChips"); typeChips=document.getElementById("typeChips");
}

// ---- build controls ----
function buildLegend(){
  const legend=document.getElementById("legend");
  Object.values(CATS).forEach(c=>{
    const lr=document.createElement("div"); lr.className="lrow";
    lr.innerHTML='<span class="sw" style="background:'+c.color+'"></span>'+c.label;
    legend.appendChild(lr);
  });
}
function buildTypeChips(){
  Object.entries(CATS).forEach(([k,c])=>{
    const b=document.createElement("button"); b.type="button"; b.className="chip c-"+k;
    b.setAttribute("aria-pressed", state.types.has(k)?"true":"false");
    b.innerHTML='<span class="cdot" style="background:'+c.color+'"></span>'+c.label+' <span class="cn">0</span>';
    b.onclick=()=>{ toggle(state.types,k,Object.keys(CATS)); syncPressed(typeChips,"c-",state.types); saveState(); render(); };
    typeChips.appendChild(b);
  });
}
function buildLevelChips(){
  LEVEL_KEYS.forEach(k=>{
    const b=document.createElement("button"); b.type="button"; b.className="lvl-btn"; b.dataset.k=String(k);
    b.textContent = k==="all" ? "All" : "L"+k;
    b.title = k==="all" ? "All-levels / open sessions" : "Level "+k;
    b.setAttribute("aria-pressed", state.levels.has(k)?"true":"false");
    b.onclick=()=>{ toggle(state.levels,k,LEVEL_KEYS); syncLevels(); saveState(); render(); };
    lvlChips.appendChild(b);
  });
}
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function buildDow(){
  DOW.forEach((d,i)=>{
    const b=document.createElement("button"); b.type="button"; b.className="dow-btn";
    b.textContent=d[0]; b.title=d; b.setAttribute("aria-label",d);
    b.setAttribute("aria-pressed", state.days.has(i)?"true":"false");
    b.onclick=()=>{ toggle(state.days,i,[0,1,2,3,4,5,6]); syncDow(); saveState(); render(); };
    dowToggle.appendChild(b);
  });
}
function initRange(){
  [tmin,tmax].forEach(s=>{ s.min=T_FLOOR; s.max=T_CEIL; s.step=30; });
  tmin.value=state.tMin; tmax.value=state.tMax;
  updateRangeUI();
  tmin.addEventListener("input",()=>{ if(+tmin.value > +tmax.value) tmin.value=tmax.value; state.tMin=+tmin.value; updateRangeUI(); saveState(); render(); });
  tmax.addEventListener("input",()=>{ if(+tmax.value < +tmin.value) tmax.value=tmin.value; state.tMax=+tmax.value; updateRangeUI(); saveState(); render(); });
}
function updateRangeUI(){
  const span=(T_CEIL-T_FLOOR)||1;
  const a=(state.tMin-T_FLOOR)/span*100, b=(state.tMax-T_FLOOR)/span*100;
  rfill.style.left=a+"%"; rfill.style.width=(b-a)+"%";
  timeLbl.textContent=minLabel(state.tMin)+" – "+minLabel(state.tMax);
}

// toggle helper: never allow an empty set (empty ⇒ select all)
function toggle(set,k,all){ if(set.has(k)) set.delete(k); else set.add(k); if(!set.size) all.forEach(x=>set.add(x)); }
function syncPressed(container,prefix,set){ container.querySelectorAll("button").forEach(b=>{ const k=[...b.classList].find(x=>x.startsWith(prefix)).slice(prefix.length); b.setAttribute("aria-pressed", set.has(k)?"true":"false"); }); }
function syncLevels(){ [...lvlChips.children].forEach(b=>{ const raw=b.dataset.k; const k=raw==="all"?"all":+raw; b.setAttribute("aria-pressed", state.levels.has(k)?"true":"false"); }); }
function syncDow(){ [...dowToggle.children].forEach((b,i)=>b.setAttribute("aria-pressed", state.days.has(i)?"true":"false")); }

// ---- month nav ----
function setMonth(ym){ const [y,m]=ym.split("-").map(Number); state.month={y,m}; }
function monthLabel(){ return new Date(state.month.y, state.month.m-1, 1).toLocaleDateString("en-US",{month:"long",year:"numeric"}); }

// ---- render ----
function render(){ updateCounts(); if(state.view==="month") renderMonth(); else renderList(); }

function evChip(e){
  const b=document.createElement("button");
  b.className="ev cat-"+e.cat+(e.full?(e.spotsLeft===0?" wl":" full"):"");
  b.title=timeLabelFull(e.start)+" · "+e.name;
  b.innerHTML='<span class="et num">'+timeLabel(e.start)+'</span><span class="en">'+e.name+'</span>';
  b.onclick=()=>openSheet(e);
  return b;
}
function renderMonth(){
  const list=filtered(); weeks.innerHTML="";
  const {y,m}=state.month;
  const byDay={}; let monthTotal=0;
  list.forEach(e=>{const o=partsOf(e.start); if(+o.year===y && +o.month===m){(byDay[e.dk]=byDay[e.dk]||[]).push(e); monthTotal++;}});
  const first=new Date(y,m-1,1), start=new Date(y,m-1,1-first.getDay());
  const lastDay=new Date(y,m,0).getDate(), rows=Math.ceil((first.getDay()+lastDay)/7);
  for(let i=0;i<rows*7;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const yy=d.getFullYear(), mm=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
    const key=yy+"-"+mm+"-"+dd, out=(d.getMonth()!==m-1);
    const cell=document.createElement("div"); cell.className="cell"+(out?" out":"")+(key===TODAY?" today":"");
    const dn=document.createElement("div"); dn.className="dnum";
    dn.innerHTML = key===TODAY ? '<span class="tpill">'+d.getDate()+'</span>' : String(d.getDate());
    cell.appendChild(dn);
    const evs=byDay[key]||[]; evs.slice(0,4).forEach(e=>cell.appendChild(evChip(e)));
    if(evs.length>4){
      const more=document.createElement("button"); more.className="more"; more.textContent="+"+(evs.length-4)+" more";
      more.onclick=()=>{ state.view="list"; syncView(); saveState(); render(); setTimeout(()=>{const el=document.getElementById("d-"+key); if(el) el.scrollIntoView({behavior:"smooth",block:"start"});},30); };
      cell.appendChild(more);
    }
    weeks.appendChild(cell);
  }
  mlabel.textContent=monthLabel();
  mcount.textContent=monthTotal+" session"+(monthTotal===1?"":"s");
  const idx=months.indexOf(y+"-"+String(m).padStart(2,"0"));
  document.getElementById("prev").disabled = idx<=0;
  document.getElementById("next").disabled = idx>=months.length-1;
  grid.hidden=false; listEl.style.display="none"; emptyEl.hidden=true; monthbar.style.display="flex";
}
function renderList(){
  const list=filtered(); listEl.innerHTML=""; grid.hidden=true; monthbar.style.display="none";
  if(!list.length){ emptyEl.hidden=false; listEl.style.display="none";
    emptyEl.innerHTML="<b>No sessions match these filters</b>Turn a filter back on, widen the time range, or reset."; return; }
  emptyEl.hidden=true; listEl.style.display="flex";
  const byDay={}; list.forEach(e=>(byDay[e.dk]=byDay[e.dk]||[]).push(e));
  Object.keys(byDay).sort().forEach(key=>{
    const evs=byDay[key]; const d=new Date(evs[0].start);
    const grp=document.createElement("div"); grp.className="daygrp"; grp.id="d-"+key;
    const hd=document.createElement("div"); hd.className="dayhd";
    hd.innerHTML='<span class="dd">'+d.toLocaleDateString("en-US",{timeZone:TZ,month:"long",day:"numeric"})+'</span>'+
                 '<span class="dw">'+d.toLocaleDateString("en-US",{timeZone:TZ,weekday:"long"})+'</span>'+
                 '<span class="dc num">'+evs.length+' session'+(evs.length===1?"":"s")+'</span>';
    grp.appendChild(hd);
    const rows=document.createElement("div"); rows.className="rows";
    evs.forEach(e=>{
      const r=document.createElement("div"); r.className="row cat-"+e.cat; r.onclick=()=>openSheet(e);
      const spots = e.spotsLeft===null ? "" :
        (e.spotsLeft===0 ? '<span class="spots none">'+(e.full?"Waitlist":"Full")+'</span>'
                         : '<span class="spots'+(e.spotsLeft<=4?" low":"")+'">'+e.spotsLeft+' spot'+(e.spotsLeft===1?"":"s")+' left</span>');
      const price = (e.regular && e.regular>0) ? '<span class="price num">$'+e.regular.toFixed(2).replace(/\.00$/,"")+'</span>' : '<span class="price">Free</span>';
      r.innerHTML=
        '<div class="rtime num">'+timeLabelFull(e.start)+'<span>'+timeLabelFull(e.end)+'</span></div>'+
        '<div><div class="rname">'+e.name+'</div><div class="rmeta">'+
          '<span class="badge b-'+e.cat+'">'+CATS[e.cat].label+'</span>'+
          '<span>DUPR '+ratingText(e)+'</span></div></div>'+
        '<div class="rright">'+price+spots+'</div>';
      rows.appendChild(r);
    });
    grp.appendChild(rows); listEl.appendChild(grp);
  });
}

// ---- modal ----
let lastFocus=null;
function openSheet(e){
  lastFocus=document.activeElement;
  const d=new Date(e.start);
  const dateStr=d.toLocaleDateString("en-US",{timeZone:TZ,weekday:"long",month:"long",day:"numeric"});
  const spots = e.spotsLeft===null ? "Open registration" :
    (e.spotsLeft===0 ? (e.full?"Full — join the waitlist":"Full") : e.spotsLeft+" of "+e.capacity+" spots left");
  const price = (e.regular&&e.regular>0)
    ? '$'+e.regular.toFixed(2).replace(/\.00$/,"")+' drop-in'+(e.member?' <span class="hint">· $'+e.member.toFixed(2).replace(/\.00$/,"")+' member</span>':'')
    : 'Free';
  sheet.innerHTML=
    '<div class="top">'+
      '<div class="cat" style="color:'+CATS[e.cat].color+'">'+CATS[e.cat].label+'</div>'+
      '<h3 id="sh-title">'+e.name+'</h3>'+
      '<div class="when num">'+dateStr+' · '+timeLabelFull(e.start)+' – '+timeLabelFull(e.end)+'</div>'+
    '</div>'+
    '<div class="body">'+
      drow("Skill","DUPR "+ratingText(e)+' <span class="hint">· Doubles</span>')+
      drow("Location","Apex Pickleball Clubs"+(e.podAddress?'<br><span class="hint">'+e.podAddress+'</span>':""))+
      drow("Price", price)+
      drow("Availability", spots)+
    '</div>'+
    '<div class="foot">'+
      '<a class="book" href="'+BOOK(e.id)+'" target="_blank" rel="noopener">Book on PodPlay →</a>'+
      '<button class="close" id="x" aria-label="Close">×</button>'+
    '</div>'+
    '<div class="note">Opens the session on apexpbclubs.podplay.app · a PodPlay account is required to reserve.</div>';
  scrim.classList.add("open");
  document.getElementById("x").onclick=closeSheet;
  document.getElementById("x").focus();
}
function drow(k,v){ return '<div class="drow"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>'; }
function closeSheet(){ scrim.classList.remove("open"); if(lastFocus)lastFocus.focus(); }

// ---- view + wiring ----
function syncView(){
  document.getElementById("v-month").setAttribute("aria-pressed", state.view==="month");
  document.getElementById("v-list").setAttribute("aria-pressed", state.view==="list");
}
function wire(){
  syncView();
  document.getElementById("v-month").onclick=()=>{state.view="month";syncView();saveState();render();};
  document.getElementById("v-list").onclick=()=>{state.view="list";syncView();saveState();render();};
  document.getElementById("prev").onclick=()=>{const i=months.indexOf(state.month.y+"-"+String(state.month.m).padStart(2,"0"));if(i>0){setMonth(months[i-1]);render();}};
  document.getElementById("next").onclick=()=>{const i=months.indexOf(state.month.y+"-"+String(state.month.m).padStart(2,"0"));if(i<months.length-1){setMonth(months[i+1]);render();}};
  document.getElementById("reset").onclick=resetFilters;
  scrim.onclick=ev=>{ if(ev.target===scrim) closeSheet(); };
  document.addEventListener("keydown",ev=>{ if(ev.key==="Escape"&&scrim.classList.contains("open"))closeSheet(); });
}
function resetFilters(){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  state.types=new Set(Object.keys(CATS)); state.levels=new Set(LEVEL_KEYS);
  state.days=new Set([0,1,2,3,4,5,6]); state.tMin=T_FLOOR; state.tMax=T_CEIL; state.view="month";
  tmin.value=T_FLOOR; tmax.value=T_CEIL;
  syncPressed(typeChips,"c-",state.types); syncLevels(); syncDow(); updateRangeUI(); syncView();
  render();
}
</script>
</body>
