<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apex PodPlay Helper</title>
<meta name="description" content="Browse and book every Apex Pickleball Clubs session — open play, clinics, and socials — filtered by level, type, day, and time.">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#101725">
<style>
  :root{
    --ink:#101725; --ink-soft:#26324a; --muted:#5b6b82; --muted-2:#8a97ab;
    --paper:#f4f6fa; --card:#ffffff; --hair:#e3e8f1; --hair-2:#eef1f7;
    --brand:#2457d6; --lime:#c7e63f;
    --c-open:#2563c9; --c-clinic:#c6741b; --c-social:#0e8c7f; --c-special:#6d3be0;
    --c-open-b:#eaf1fd; --c-clinic-b:#fbf0e2; --c-social-b:#e6f5f2; --c-special-b:#f0ebfc;
    --full:#b03636; --star:#e0a400; --mine:#178a3d; --conflict:#55606e; --conflict-b:#eef1f5;
    --shadow:0 1px 2px rgba(16,23,37,.06),0 8px 24px rgba(16,23,37,.06);
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .wrap{max-width:1200px;margin:0 auto;padding:0 20px 72px}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

  /* header */
  header.hero{background:var(--ink);color:#fff;border-bottom:3px solid var(--lime)}
  .hero-in{max-width:1200px;margin:0 auto;padding:32px 20px 28px;
    display:flex;flex-wrap:wrap;gap:26px 40px;align-items:flex-end;justify-content:space-between}
  .eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    color:var(--lime);display:flex;align-items:center;gap:9px}
  .eyebrow .dot{width:9px;height:9px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 4px rgba(199,230,63,.18)}
  h1{font-size:clamp(28px,4.2vw,44px);line-height:1.03;letter-spacing:-.03em;font-weight:800;
    margin:12px 0 0;text-wrap:balance;max-width:18ch}
  .sub{color:#aeb9cc;margin:11px 0 0;max-width:58ch;font-size:14.5px}
  .sub b{color:#e7ecf5;font-weight:600}
  .snap{margin-top:8px;font-size:11.5px;color:#7c8aa2;letter-spacing:.02em}
  .legend{display:flex;flex-direction:column;gap:11px;min-width:190px}
  .legend .lrow{display:flex;align-items:center;gap:10px;font-size:13px;color:#c8d1e0}
  .legend .sw{width:13px;height:13px;border-radius:4px;flex:none}

  /* loading / error */
  .state{max-width:1200px;margin:0 auto;padding:80px 20px;text-align:center;color:var(--muted)}
  .state b{display:block;color:var(--ink);font-size:18px;font-weight:700;margin-bottom:8px}
  .state a{color:var(--brand);font-weight:600;cursor:pointer}
  .spinner{width:26px;height:26px;border:3px solid var(--hair);border-top-color:var(--brand);
    border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(prefers-reduced-motion:reduce){.spinner{animation:none}}

  /* controls */
  .controls{position:sticky;top:0;z-index:30;background:rgba(244,246,250,.9);
    backdrop-filter:saturate(160%) blur(10px);border-bottom:1px solid var(--hair);margin-bottom:22px}
  .controls-in{max-width:1200px;margin:0 auto;padding:11px 20px;display:flex;flex-direction:column;gap:11px}
  .crow{display:flex;flex-wrap:wrap;gap:11px 16px;align-items:center}
  .crow2{border-top:1px solid var(--hair-2);padding-top:11px}
  /* mobile filter modal: hidden on desktop (filters always shown inline, no modal) */
  .filttoggle{display:none}
  .filtfoot{display:none}
  .fcount:empty{display:none}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1px solid var(--hair);background:var(--card);color:var(--ink-soft);
    padding:7px 13px 7px 11px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:7px;line-height:1;transition:border-color .15s,background .15s,color .15s,box-shadow .15s}
  .chip .cdot{width:9px;height:9px;border-radius:50%;flex:none}
  .chip .cn{font-variant-numeric:tabular-nums;color:var(--muted-2);font-weight:600}
  .chip[aria-pressed="true"]{color:#fff;border-color:transparent;box-shadow:var(--shadow)}
  .chip[aria-pressed="true"] .cn{color:rgba(255,255,255,.7)}
  .chip.c-openplay[aria-pressed="true"]{background:var(--c-open)}
  .chip.c-clinic[aria-pressed="true"]{background:var(--c-clinic)}
  .chip.c-social[aria-pressed="true"]{background:var(--c-social)}
  .chip.c-special[aria-pressed="true"]{background:var(--c-special)}
  .chip:focus-visible,.iconbtn:focus-visible,.seg button:focus-visible,.ev:focus-visible,.book:focus-visible,
  .dow-btn:focus-visible,.lvl-btn:focus-visible,.reset:focus-visible,.range input:focus-visible::-webkit-slider-thumb{
    outline:2px solid var(--brand);outline-offset:2px}
  .spacer{flex:1 1 30px}
  .fld{display:flex;align-items:center;gap:9px}
  .fld > label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .seg{display:flex;border:1px solid var(--hair);border-radius:8px;overflow:hidden;background:var(--card)}
  .seg button{font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);background:transparent;
    border:0;padding:7px 13px;cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--brand);color:#fff}
  .reset{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:none;border:0;
    cursor:pointer;padding:6px 4px;text-decoration:underline;text-underline-offset:3px}
  .reset:hover{color:var(--brand)}
  .search{font-family:inherit;font-size:13px;color:var(--ink-soft);background:var(--card);border:1px solid var(--hair);
    border-radius:8px;padding:7px 11px;width:200px;max-width:48vw}
  .search::placeholder{color:var(--muted-2)}
  .toggle{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);background:var(--card);
    border:1px solid var(--hair);border-radius:999px;padding:7px 13px;cursor:pointer;display:flex;align-items:center;gap:7px;line-height:1;
    transition:background .15s,border-color .15s,color .15s}
  .toggle .tk{width:8px;height:8px;border-radius:50%;background:var(--muted-2)}
  .toggle[aria-pressed="true"]{background:var(--c-social);color:#fff;border-color:transparent}
  .toggle[aria-pressed="true"] .tk{background:#fff}
  .search:focus-visible,.toggle:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  /* saved views */
  .views{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .viewchip{display:inline-flex;align-items:center;border:1px solid var(--hair);border-radius:999px;background:var(--card);overflow:hidden}
  .viewchip .vapply{border:0;background:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink-soft);padding:6px 5px 6px 12px;cursor:pointer}
  .viewchip .vdel{border:0;background:none;color:var(--muted-2);cursor:pointer;font-size:15px;line-height:1;padding:6px 10px 6px 4px}
  .viewchip .vdel:hover{color:var(--full)}
  .viewsave{border:1px dashed var(--hair);background:none;border-radius:999px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);padding:6px 12px;cursor:pointer}
  .viewsave:hover{border-color:var(--brand);color:var(--brand)}
  .viewadd{display:inline-flex;gap:6px;align-items:center}
  .viewname{font-family:inherit;font-size:12.5px;color:var(--ink-soft);border:1px solid var(--brand);border-radius:8px;padding:6px 9px;width:150px;max-width:44vw}
  .vsave{border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:600;padding:6px 12px;cursor:pointer}
  .vapply:focus-visible,.vdel:focus-visible,.viewsave:focus-visible,.vsave:focus-visible,.viewname:focus-visible{outline:2px solid var(--brand);outline-offset:1px}

  /* level + day toggles */
  .lvl-toggle,.dow-toggle{display:flex;gap:5px;flex-wrap:wrap}
  .lvl-btn{height:30px;padding:0 11px;border-radius:8px;border:1px solid var(--hair);background:var(--card);
    color:var(--muted);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;
    transition:background .15s,border-color .15s,color .15s}
  .dow-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--hair);background:var(--card);
    color:var(--muted);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;
    transition:background .15s,border-color .15s,color .15s}
  .lvl-btn[aria-pressed="true"],.dow-btn[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:transparent}
  .lvl-btn:hover,.dow-btn:hover{border-color:var(--brand)}

  /* time range slider */
  .time-fld{gap:12px}
  .range{position:relative;width:210px;height:30px;flex:none}
  .range-track,.range-fill{position:absolute;top:50%;transform:translateY(-50%);height:4px;border-radius:2px}
  .range-track{left:0;right:0;background:var(--hair)}
  .range-fill{background:var(--brand)}
  .range input{position:absolute;top:50%;transform:translateY(-50%);left:0;width:100%;height:18px;margin:0;
    background:none;pointer-events:none;-webkit-appearance:none;appearance:none}
  .range input::-webkit-slider-runnable-track{background:none;border:none}
  .range input::-moz-range-track{background:none;border:none}
  .range input::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:auto;width:17px;height:17px;
    border-radius:50%;background:#fff;border:2px solid var(--brand);box-shadow:var(--shadow);cursor:pointer}
  .range input::-moz-range-thumb{pointer-events:auto;width:17px;height:17px;border-radius:50%;
    background:#fff;border:2px solid var(--brand);box-shadow:var(--shadow);cursor:pointer}
  .time-label{font-size:13px;font-weight:700;color:var(--ink-soft);min-width:132px}

  /* month nav */
  .monthbar{display:flex;align-items:center;gap:14px;margin:2px 0 16px}
  .monthbar h2{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:0}
  .iconbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--hair);background:var(--card);
    color:var(--ink-soft);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;
    justify-content:center;transition:background .15s,border-color .15s}
  .iconbtn:hover:not(:disabled){border-color:var(--brand);color:var(--brand)}
  .iconbtn:disabled{opacity:.35;cursor:default}
  .mcount{color:var(--muted);font-size:13px;font-weight:600}

  /* month grid */
  .grid{background:var(--card);border:1px solid var(--hair);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);background:#fbfcfe;border-bottom:1px solid var(--hair)}
  .dow div{padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .weeks{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));overflow:hidden}
  .cell{position:relative;min-width:0;min-height:132px;border-right:1px solid var(--hair-2);border-bottom:1px solid var(--hair-2);
    padding:8px 8px 10px;display:flex;flex-direction:column;gap:5px}
  .cell:nth-child(7n){border-right:0}
  .cell.out{background:#fafbfd}
  .cell.today{background:#f3f7ff}
  .dnum{font-size:12.5px;font-weight:700;color:var(--ink-soft);align-self:flex-start;font-variant-numeric:tabular-nums;
    display:flex;align-items:center;gap:6px}
  .cell.out .dnum{color:var(--muted-2)}
  .cell.today .dnum .tpill{background:var(--brand);color:#fff;border-radius:999px;padding:1px 7px;font-size:11px}
  .ev{border:0;text-align:left;width:100%;min-width:0;cursor:pointer;font-family:inherit;border-radius:6px;
    padding:4px 7px;font-size:11.5px;line-height:1.25;display:flex;flex-direction:column;gap:1px;
    border-left:3px solid;background:#f5f7fa;overflow:hidden}
  .ev .et{font-weight:700;font-variant-numeric:tabular-nums}
  .ev .en{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-soft);font-weight:500}
  .ev.full{opacity:.62}
  .ev.full .et::after{content:" \00B7 Full";color:var(--full);font-weight:700}
  .ev.wl .et::after{content:" \00B7 Waitlist";color:var(--c-clinic);font-weight:700}
  .cat-openplay{border-left-color:var(--c-open);background:var(--c-open-b)}
  .cat-clinic{border-left-color:var(--c-clinic);background:var(--c-clinic-b)}
  .cat-social{border-left-color:var(--c-social);background:var(--c-social-b)}
  .cat-special{border-left-color:var(--c-special);background:var(--c-special-b)}
  .cat-openplay .et{color:var(--c-open)} .cat-clinic .et{color:var(--c-clinic)}
  .cat-social .et{color:var(--c-social)} .cat-special .et{color:var(--c-special)}
  .more{font-size:11px;font-weight:700;color:var(--muted);background:none;border:0;cursor:pointer;padding:2px 4px;align-self:flex-start}
  .more:hover{color:var(--brand)}

  /* list */
  .list{display:none;flex-direction:column;gap:26px}
  .daygrp{background:var(--card);border:1px solid var(--hair);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .dayhd{display:flex;align-items:baseline;gap:12px;padding:14px 18px;border-bottom:1px solid var(--hair-2);background:#fbfcfe}
  .dayhd .dd{font-size:16px;font-weight:800;letter-spacing:-.01em}
  .dayhd .dw{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .dayhd .dc{margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:600}
  .rows{display:flex;flex-direction:column}
  .row{display:grid;grid-template-columns:132px 1fr auto;gap:16px;align-items:center;padding:13px 18px;
    border-bottom:1px solid var(--hair-2);border-left:4px solid;cursor:pointer}
  .row:last-child{border-bottom:0}
  .row:hover{background:#fafbfe}
  .row:focus-visible,.cell[role="button"]:focus-visible{outline:2px solid var(--brand);outline-offset:-2px}
  .row .rtime{font-weight:700;font-variant-numeric:tabular-nums;font-size:13.5px}
  .row .rtime span{display:block;font-weight:600;color:var(--muted);font-size:12px}
  .row .rname{font-weight:600}
  .row .rmeta{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:4px 12px}
  .row .rright{text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
  .row.cat-openplay{border-left-color:var(--c-open)} .row.cat-clinic{border-left-color:var(--c-clinic)}
  .row.cat-social{border-left-color:var(--c-social)} .row.cat-special{border-left-color:var(--c-special)}
  .badge{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
  .b-openplay{background:var(--c-open-b);color:var(--c-open)} .b-clinic{background:var(--c-clinic-b);color:var(--c-clinic)}
  .b-social{background:var(--c-social-b);color:var(--c-social)} .b-special{background:var(--c-special-b);color:var(--c-special)}
  .price{font-weight:700;font-variant-numeric:tabular-nums;font-size:14px}
  .spots{font-size:12px;font-weight:600;color:var(--c-social)}
  .spots.low{color:var(--c-clinic)} .spots.none{color:var(--full)}
  .empty{padding:60px 20px;text-align:center;color:var(--muted)}
  .empty b{color:var(--ink);font-weight:700;display:block;font-size:17px;margin-bottom:6px}

  /* mobile: tap-a-day calendar */
  .daypanel{display:none;margin-top:14px;scroll-margin-top:72px}   /* clear the sticky filter bar when scrolled to */
  .daypanel .daygrp{margin-bottom:14px}
  .daypanel .daygrp:last-child{margin-bottom:0}
  .panelcap{font-size:12px;color:var(--muted);font-weight:600;padding:0 2px 10px}
  .daydots{display:none}
  .dot-c{width:6px;height:6px;border-radius:50%}
  .dot-c.openplay{background:var(--c-open)} .dot-c.clinic{background:var(--c-clinic)}
  .dot-c.social{background:var(--c-social)} .dot-c.special{background:var(--c-special)}
  .paneln{padding:20px 18px;color:var(--muted);font-size:13.5px}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(16,23,37,.5);backdrop-filter:blur(2px);display:none;
    align-items:center;justify-content:center;z-index:100;padding:20px}
  .scrim.open{display:flex}
  .sheet{background:var(--card);border-radius:16px;max-width:440px;width:100%;
    box-shadow:0 24px 64px rgba(16,23,37,.32);overflow-y:auto;overscroll-behavior:contain;
    max-height:calc(100vh - 40px);max-height:calc(100dvh - 40px);animation:pop .18s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.sheet{animation:none}}
  .sheet .top{padding:20px 22px 18px;border-bottom:1px solid var(--hair-2)}
  .sheet .cat{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .sheet h3{margin:8px 0 0;font-size:21px;font-weight:800;letter-spacing:-.02em;text-wrap:balance}
  .sheet .when{margin-top:6px;color:var(--ink-soft);font-weight:600;font-variant-numeric:tabular-nums}
  .sheet .body{padding:6px 22px 4px}
  .drow{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--hair-2);font-size:14px}
  .drow:last-child{border-bottom:0}
  .drow .k{width:96px;flex:none;color:var(--muted);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding-top:2px}
  .drow .v{color:var(--ink);font-weight:500}
  .drow .v .hint{color:var(--muted);font-weight:500}
  .meter{height:6px;border-radius:3px;background:var(--hair-2);margin-top:8px;overflow:hidden;max-width:240px}
  .meter span{display:block;height:100%;border-radius:3px;background:var(--c-social)}
  .meter.hot span{background:var(--c-clinic)}
  .meter.full span{background:var(--full)}
  .courtsnote{font-size:12px;color:var(--muted);margin-top:5px}
  .sheet .foot{padding:16px 22px 20px;display:flex;gap:10px;align-items:center}
  .book{flex:1;background:var(--brand);color:#fff;text-decoration:none;text-align:center;font-weight:700;font-size:15px;
    padding:12px 16px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
  .book:hover{background:#1c47b4}
  .close{width:40px;height:40px;border-radius:10px;border:1px solid var(--hair);background:var(--card);cursor:pointer;
    font-size:20px;color:var(--muted);flex:none}
  .close:hover{border-color:var(--full);color:var(--full)}
  .note{font-size:11.5px;color:var(--muted-2);text-align:center;padding:0 22px 18px}

  /* friends: badges, roster, manager */
  .fbadge{color:var(--star);font-weight:700;font-variant-numeric:tabular-nums}
  .ev .fstar{color:var(--star);font-weight:700}
  .mebadge{color:var(--mine);font-weight:700}
  .mebadge.wl{color:var(--c-clinic)}
  .ev .mestar{color:var(--mine);font-weight:800}
  .ev .mestar.wl{color:var(--c-clinic)}
  /* "you're signed up" made obvious in tiles/rows without opening */
  .ev.mine{box-shadow:inset 0 0 0 1.5px var(--mine)}
  .ev.minewl{box-shadow:inset 0 0 0 1.5px var(--c-clinic)}
  .row.mine{background:#eaf7ee}
  .row.mine:hover{background:#e0f2e6}
  .row.minewl{background:#fbf3e3}
  .row.minewl:hover{background:#f6ecd8}
  .daymine{position:absolute;top:4px;right:5px;color:var(--mine);font-size:11px;font-weight:800;line-height:1}
  .daymine.wl{color:var(--c-clinic)}
  /* you can only be on one court at a time — flag sessions that clash with something you're already booked into */
  .ev .cflag{color:var(--conflict);font-weight:800}
  .ev.conflict{box-shadow:inset 0 0 0 1.5px var(--conflict);opacity:.94}
  .cbadge{color:var(--conflict);font-weight:700}
  .row.conflict{background:var(--conflict-b)}
  .row.conflict:hover{background:#e3e7ed}
  .conflictnote{margin:0 22px 14px;padding:10px 12px;border-radius:10px;background:var(--conflict-b);
    display:flex;gap:8px;align-items:flex-start;font-size:13px;line-height:1.4;color:var(--ink-soft)}
  .conflictnote b{color:var(--ink)}
  .roster li.isme{background:#e7f6ec}
  .roster .metag{margin-left:auto;font-size:11px;font-weight:700;color:var(--mine);text-transform:uppercase;letter-spacing:.06em}
  .roster .rhd.wl{color:var(--c-clinic)}
  .me-box{padding:10px 22px 4px}
  .me-box .cur{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
  .me-box .cur .who{color:var(--mine)}

    font-size:12px;font-weight:600;border-radius:7px;padding:4px 9px}

  @media(max-width:720px){

    .eyebrow{letter-spacing:.13em}
    /* comfortable touch targets (≥40px) */

    .filttoggle .chev{width:8px;height:8px;border-right:2px solid currentColor;border-bottom:2px solid currentColor;transform:translateY(-2px) rotate(45deg);transition:transform .18s}
    .filttoggle .fclose{display:none;font-size:22px;line-height:.6;font-weight:400}

    body.filters-open .controls{position:fixed;inset:0;z-index:200;margin:0;background:var(--paper);
      display:flex;flex-direction:column;backdrop-filter:none;animation:modalIn .16s ease}

      border-top:1px solid var(--hair);background:var(--card)}

  }
</style>

<body>

<header class="hero">
  <div class="hero-in">
    <div>
      <div class="eyebrow"><span class="dot"></span>Apex Pickleball Clubs &middot; Cedar Park, TX</div>
      <h1>Open Play, Clinics &amp; Socials</h1>
      <p class="sub">Browse every listed session at Apex and book straight on PodPlay. Filter by <b>level</b>, <b>type</b>, <b>day</b>, and <b>start time</b> &mdash; your filters are saved on this device.</p>
      <p class="snap" id="snap"></p>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</header>

<div class="state" id="loading"><div class="spinner"></div>Loading sessions&hellip;</div>
<div class="state" id="error" hidden></div>

<div id="app" hidden>
  <div class="controls">
    <div class="controls-in">
      <div class="crow crow-top">
        <button class="filttoggle" id="filtToggle" type="button" aria-controls="filterBody" aria-expanded="false"><span class="chev" aria-hidden="true"></span>Filters<span class="fcount" id="filtCount"></span><span class="fclose" aria-hidden="true">&times;</span></button>
        <div class="spacer"></div>
        <div class="seg" role="group" aria-label="View">
          <button id="v-month" aria-pressed="true">Month</button>
          <button id="v-list" aria-pressed="false">List</button>
        </div>
      </div>
      <div class="filterbody" id="filterBody">
        <div class="crow">
          <div class="fld"><label>Views</label><div class="views" id="views"></div></div>
        </div>
        <div class="crow crow2">
          <div class="chips" id="typeChips"></div>
          <div class="spacer"></div>
          <input class="search" id="search" type="search" placeholder="Search sessions…" aria-label="Search sessions">
        </div>
        <div class="crow crow2">
          <div class="fld">
            <label>Level</label>
            <div class="lvl-toggle" id="lvlChips" role="group" aria-label="Skill level"></div>
          </div>
          <div class="spacer"></div>
          <div class="fld">
            <label>Days</label>
            <div class="dow-toggle" id="dowToggle" role="group" aria-label="Days of week"></div>
          </div>
        </div>
        <div class="crow crow2">
          <div class="fld time-fld">
            <label>Start time</label>
            <div class="range" id="range">
              <div class="range-track"></div>
              <div class="range-fill" id="rfill"></div>
              <input type="range" id="tmin" aria-label="Earliest start time">
              <input type="range" id="tmax" aria-label="Latest start time">
            </div>
            <span class="time-label num" id="timeLabel"></span>
          </div>
          <div class="spacer"></div>
          <button class="toggle" id="mineOnly" type="button" aria-pressed="false"><span class="tk"></span>✓ My sessions</button>
          <button class="toggle" id="friendsOnly" type="button" aria-pressed="false"><span class="tk"></span>★ Friends</button>
          <button class="toggle" id="openOnly" type="button" aria-pressed="false"><span class="tk"></span>Open spots only</button>
          <div class="fld">
            <label>Women&rsquo;s</label>
            <div class="seg" id="womenSeg" role="group" aria-label="Women&rsquo;s sessions">
              <button data-w="all" aria-pressed="true">All</button>
              <button data-w="only" aria-pressed="false">Only</button>
              <button data-w="none" aria-pressed="false">Hide</button>
            </div>
          </div>
          <button class="reset" id="manageFriends" type="button">You &amp; friends</button>
          <button class="reset" id="reset" type="button">Reset filters</button>
        </div>
      </div>
      <div class="filtfoot" id="filtFoot">
        <button class="book" id="filtDone" type="button">Show sessions</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="monthbar" id="monthbar">
      <button class="iconbtn" id="prev" aria-label="Previous month">&lsaquo;</button>
      <button class="iconbtn" id="next" aria-label="Next month">&rsaquo;</button>
      <h2 id="mlabel"></h2>
      <span class="mcount num" id="mcount"></span>
    </div>
    <div class="grid" id="grid" hidden>
      <div class="dow"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
      <div class="weeks" id="weeks"></div>
    </div>
    <div class="daypanel" id="dayPanel"></div>
    <div class="list" id="list"></div>
    <div class="empty" id="empty" hidden></div>
  </div>

  <div class="scrim" id="scrim" role="dialog" aria-modal="true" aria-labelledby="sh-title">
    <div class="sheet" id="sheet"></div>
  </div>
</div>

<script>
"use strict";
const TZ = "America/Chicago";
const BOOK = id => "https://apexpbclubs.podplay.app/community/events/" + id;
const MQ = window.matchMedia("(max-width:720px)");   // mobile calendar breakpoint
const LS_KEY = "apex-podplay-filters";

const CATS = {
  openplay: {label:"Open Play", color:"var(--c-open)"},
  clinic:   {label:"Clinic",    color:"var(--c-clinic)"},
  social:   {label:"Social",    color:"var(--c-social)"},
  special:  {label:"Special",   color:"var(--c-special)"},
};
function classifyType(e){
  const n=(e.name||"").toLowerCase();
  const tags=e.tags||[];
  if(e.customType==="Clinics" || tags.includes("Clinics")) return "clinic";
  if(/social|ladies/.test(n) || tags.includes("Women")) return "social";
  if(e.customType==="Private Event") return "special";
  return "openplay";
}
// Level "tokens" carry the +/combined nuance the numeric tag can't: "3", "3+", etc.
// Parse them from the name (where the "+" lives), falling back to numeric tags.
function levelTokensOf(e){
  const tokens=new Set();
  const m=/level[s]?\s*([0-9+/&.\s-]+)/i.exec(e.name||"");
  if(m){ const re=/(\d)(?:\.\d)?(\+?)/g; let x; while((x=re.exec(m[1]))) tokens.add(x[1]+(x[2]||"")); }
  if(!tokens.size){ (e.tags||[]).forEach(t=>{ const mm=/^Level\s+(\d)/.exec(t); if(mm) tokens.add(mm[1]); }); }
  return { tokens:[...tokens], isOpen:(e.tags||[]).includes("All Levels") || tokens.size===0 };
}
// sort tokens 1, 1+, 2, 2+, 3, ... (plain before its "+" variant)
function tokenSort(a,b){ const na=parseInt(a,10), nb=parseInt(b,10); if(na!==nb) return na-nb; return (a.includes("+")?1:0)-(b.includes("+")?1:0); }
// PodPlay only opens registration a set number of days ahead. Hide sessions past that range:
// use the precise signup-open time when known; for the few events that ship without one,
// fall back to the observed ~14-day (member) advance so nothing leaks past the window.
const FALLBACK_ADVANCE_MS = 14 * 864e5;
function signupWindowOpen(e){
  const now=Date.now();
  if(e.signupOpen) return new Date(e.signupOpen).getTime() <= now;
  return new Date(e.start).getTime() <= now + FALLBACK_ADVANCE_MS;
}

// ---- date helpers (Cedar Park / Central) ----
const fmtCache={};
function fmt(opts){ const k=JSON.stringify(opts); return fmtCache[k] || (fmtCache[k]=new Intl.DateTimeFormat("en-US",{timeZone:TZ,...opts})); }
function partsOf(iso){ const o={}; fmt({year:"numeric",month:"2-digit",day:"2-digit",weekday:"short",hour:"numeric",minute:"2-digit",hour12:true}).formatToParts(new Date(iso)).forEach(p=>o[p.type]=p.value); return o; }
const DOWMAP={Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
function minutesOfDay(iso){ const o={}; fmt({hour:"2-digit",minute:"2-digit",hour12:false}).formatToParts(new Date(iso)).forEach(p=>o[p.type]=p.value); let h=parseInt(o.hour,10); if(h>=24)h-=24; return h*60+parseInt(o.minute,10); }
function dayKey(iso){ const o=partsOf(iso); return o.year+"-"+o.month+"-"+o.day; }
function timeLabel(iso){ const o=partsOf(iso); return o.hour+":"+o.minute+o.dayPeriod.toLowerCase().replace("m",""); }
function timeLabelFull(iso){ const o=partsOf(iso); return o.hour+":"+o.minute+" "+o.dayPeriod; }
function todayKey(){ const o={}; fmt({year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date()).forEach(p=>o[p.type]=p.value); return o.year+"-"+o.month+"-"+o.day; }
function minLabel(m){ let h=Math.floor(m/60), mm=m%60; const ap=h>=12?"PM":"AM"; let hh=h%12; if(hh===0)hh=12; return hh+":"+String(mm).padStart(2,"0")+" "+ap; }
function ratingText(e){ if(e.minRating==null && e.maxRating==null) return "Open"; return (e.minRating!=null?e.minRating:"")+"–"+(e.maxRating!=null?e.maxRating:""); }
// capacity is courts × 6, so raw "spots left" hides how full a session really is:
// 6 left of 12 is a half-empty court; 6 left of 64 is nearly packed. Show % full.
function pctFull(e){ return e.capacity ? Math.round(((e.signedUp||0)/e.capacity)*100) : null; }
function availText(e){
  if(e.spotsLeft===null) return "Open registration";
  if(e.spotsLeft===0) return e.full?"Full — join the waitlist":"Full";
  return e.spotsLeft+" of "+e.capacity+" spots left"+(e.signedUp?" · "+pctFull(e)+"% full":"");
}
function meterHtml(e){
  const pct=pctFull(e); if(pct===null) return "";
  const courts=(e.capacity>0 && e.capacity%6===0)?e.capacity/6:null;
  const cls=pct>=100?" full":(pct>=80?" hot":"");
  return '<div class="meter'+cls+'" role="img" aria-label="'+pct+'% full"><span style="width:'+Math.min(100,pct)+'%"></span></div>'
    +(courts?'<div class="courtsnote">'+courts+' court'+(courts===1?"":"s")+' · 6 players per court</div>':"");
}

// ---- module state, filled by boot() ----
let data=[], TODAY, T_FLOOR, T_CEIL, months=[], state, LEVEL_KEYS=["all"], selDays=new Set(), defaultedMonth=null, PEOPLE=[], curList=[];
let grid,weeks,listEl,emptyEl,mlabel,mcount,monthbar,scrim,sheet,tmin,tmax,rfill,timeLbl,dowToggle,lvlChips,typeChips,dayPanel,searchEl,openOnlyBtn,friendsOnlyBtn,manageFriendsBtn,mineOnlyBtn,womenSeg,controlsEl,filtToggle,filtCount,filtDoneBtn,views;

// ---- friends (per-device, keyed on stable PodPlay profile id) ----
const FRIENDS_KEY="apex-podplay-friends";
let friends=new Map();   // id -> name
function loadFriends(){ try{ const a=JSON.parse(localStorage.getItem(FRIENDS_KEY)); if(Array.isArray(a)) a.forEach(f=>{ if(f&&f.id) friends.set(f.id, f.name||""); }); }catch(e){} }
function saveFriends(){ try{ localStorage.setItem(FRIENDS_KEY, JSON.stringify([...friends].map(([id,name])=>({id,name})))); }catch(e){} }
function toggleFriend(id,name){ if(friends.has(id)) friends.delete(id); else friends.set(id,name); saveFriends(); }
function friendCountIn(e){ if(!e._attIds) return 0; const myId=me&&me.id; let c=0; for(const id of friends.keys()) if(id!==myId && e._attIds.has(id)) c++; return c; }

// ---- "me": self-identification (no login) — matches your profile id in the baked rosters ----
const ME_KEY="apex-podplay-me";
let me=null;   // {id, name}
function loadMe(){ try{ const m=JSON.parse(localStorage.getItem(ME_KEY)); if(m&&m.id) me={id:m.id,name:m.name||""}; }catch(e){} }
function saveMe(){ try{ me ? localStorage.setItem(ME_KEY,JSON.stringify(me)) : localStorage.removeItem(ME_KEY); }catch(e){} }
function myStatus(e){
  if(!me) return null;
  if(e._attIds && e._attIds.has(me.id)) return {t:"in"};
  if(e._wlIds && e._wlIds.has(me.id)) return {t:"wl", pos:(e._wl.findIndex(a=>a.id===me.id)+1)||null};
  return null;
}
// you can only physically be on one court at a time: flag sessions that overlap
// something you're actually confirmed for (a waitlist spot isn't a real conflict yet).
// recomputed once per render() — see there — not per event, since it's the same for every event.
let myRegistered=[];
function refreshMyRegistered(){ myRegistered = me ? data.filter(e=>{ const s=myStatus(e); return s&&s.t==="in"; }) : []; }
function conflictEvent(e){
  if(!myRegistered.length) return null;
  const s=myStatus(e); if(s && s.t==="in") return null;   // this *is* the booked one — not a conflict with itself
  return myRegistered.find(o=>o.id!==e.id && o.start_ms<e.end_ms && o.end_ms>e.start_ms) || null;
}

// ---- saved views: name + recall a filter combo (e.g. "Weekend evenings") ----
const VIEWS_KEY="apex-podplay-views";
let savedViews=[];
function loadViews(){ try{ const a=JSON.parse(localStorage.getItem(VIEWS_KEY)); if(Array.isArray(a)) savedViews=a.filter(v=>v&&v.name&&v.f); }catch(e){} }
function saveViews(){ try{ localStorage.setItem(VIEWS_KEY, JSON.stringify(savedViews)); }catch(e){} }
function snapshotFilters(){ return { types:[...state.types], levels:[...state.levels], days:[...state.days],
  tMin:state.tMin, tMax:state.tMax, openOnly:state.openOnly, friendsOnly:state.friendsOnly, mineOnly:state.mineOnly, women:state.women, search:state.search }; }
function applyView(f){
  if(!f) return;
  const okL=new Set(LEVEL_KEYS);
  const t=(f.types||[]).filter(k=>CATS[k]); state.types=new Set(t.length?t:Object.keys(CATS));
  let lv=(f.levels||[]).filter(k=>okL.has(k)); if(lv.includes("all")||!lv.length) lv=["all"]; state.levels=new Set(lv);
  const d=(f.days||[]).filter(x=>x>=0&&x<=6); state.days=new Set(d.length?d:[0,1,2,3,4,5,6]);
  state.tMin = typeof f.tMin==="number" ? Math.min(Math.max(f.tMin,T_FLOOR),T_CEIL) : T_FLOOR;
  state.tMax = typeof f.tMax==="number" ? Math.min(Math.max(f.tMax,T_FLOOR),T_CEIL) : T_CEIL;
  if(state.tMin>state.tMax){ state.tMin=T_FLOOR; state.tMax=T_CEIL; }
  state.openOnly=!!f.openOnly; state.friendsOnly=!!f.friendsOnly; state.mineOnly=!!(f.mineOnly&&me);
  state.women=(f.women==="only"||f.women==="none")?f.women:(f.womenOnly?"only":"all");   // incl. legacy boolean views
  state.search=f.search||"";
  tmin.value=state.tMin; tmax.value=state.tMax; searchEl.value=state.search;
  openOnlyBtn.setAttribute("aria-pressed",state.openOnly?"true":"false");
  friendsOnlyBtn.setAttribute("aria-pressed",state.friendsOnly?"true":"false");
  mineOnlyBtn.setAttribute("aria-pressed",state.mineOnly?"true":"false");
  syncWomen();
  syncPressed(typeChips,"c-",state.types); syncLevels(); syncDow(); updateRangeUI();
  saveState(); render();
}
function buildViews(){
  views.innerHTML="";
  savedViews.forEach((v,i)=>{
    const chip=document.createElement("span"); chip.className="viewchip";
    chip.innerHTML='<button class="vapply" type="button">'+esc(v.name)+'</button><button class="vdel" type="button" aria-label="Delete view '+esc(v.name)+'">×</button>';
    chip.querySelector(".vapply").onclick=()=>applyView(v.f);
    chip.querySelector(".vdel").onclick=()=>{ savedViews.splice(i,1); saveViews(); buildViews(); };
    views.appendChild(chip);
  });
  const save=document.createElement("button"); save.type="button"; save.className="viewsave"; save.textContent="+ Save current";
  save.onclick=()=>{
    const wrap=document.createElement("span"); wrap.className="viewadd";
    wrap.innerHTML='<input class="viewname" type="text" maxlength="28" placeholder="Name this view" aria-label="View name"><button class="vsave" type="button">Save</button>';
    save.replaceWith(wrap);
    const inp=wrap.querySelector(".viewname"), ok=wrap.querySelector(".vsave");
    const commit=()=>{ const n=inp.value.trim(); if(n){ savedViews.push({name:n, f:snapshotFilters()}); saveViews(); } buildViews(); };
    ok.onclick=commit;
    inp.onkeydown=ev=>{ if(ev.key==="Enter"){ ev.preventDefault(); commit(); } else if(ev.key==="Escape"){ buildViews(); } };
    inp.focus();
  };
  views.appendChild(save);
}

// ---- client-side anonymous PodPlay token (for live per-session roster refresh) ----
const FB_KEY="AIzaSyBlx8IDFiOEXeTEAuXLpvIn4FeOxEfBUxY";
const API_BASE="https://apexpbclubs.podplay.app/apis/v2";
let _tokenP=null;
function anonToken(){
  return _tokenP || (_tokenP=fetch("https://identitytoolkit.googleapis.com/v1/accounts:signUp?key="+FB_KEY,
    {method:"POST",headers:{"content-type":"application/json"},body:'{"returnSecureToken":true}'})
    .then(r=>r.json()).then(j=>j.idToken).catch(()=>{ _tokenP=null; return null; }));
}
const LIVE_SKIP=new Set(["CANCELED","DECLINED","REMOVED","WAITLISTED"]);
function personOf(rec){ const p=rec.inviteeProfile||rec.profile||rec.invitee||{}; return p.id?{id:p.id,name:[p.firstName,p.lastName].filter(Boolean).join(" ").trim()||p.initials||""}:null; }
// fetch this event's current roster + waitlist and update it in place; returns true if data present
async function refreshRoster(e){
  const tok=await anonToken(); if(!tok) return false;
  const hz={accept:"application/json",authorization:"Bearer "+tok};
  try{
    const inv=await (await fetch(`${API_BASE}/events/${e.id}/invitations?expand=items._links.inviteeProfile&ipp=100`,{headers:hz})).json();
    const att=[]; for(const r of inv.items||[]){ if(r.type!=="EVENT_SIGNUP"||LIVE_SKIP.has(r.status))continue; const p=personOf(r); if(p)att.push(p); }
    let wl=[];
    if(e.full){ try{ const w=await (await fetch(`${API_BASE}/events/${e.id}/waitlist?expand=items._links.inviteeProfile&ipp=100`,{headers:hz})).json(); wl=(w.items||[]).map(personOf).filter(Boolean); }catch(x){} }
    applyRoster(e, att, wl);
    // roster is now the source of truth → refresh the counts too, so spots/badges match
    e.signedUp = att.length;
    if(e.capacity){ e.spotsLeft = Math.max(0, e.capacity-att.length); e.full = att.length>=e.capacity; }
    e._live=true; return true;
  }catch(x){ return false; }
}
function applyRoster(e, att, wl){
  e._att=att.length?att:null; e._attIds=att.length?new Set(att.map(a=>a.id)):null; e._attNames=att.length?att.map(a=>a.name.toLowerCase()):null;
  e._wl=wl.length?wl:null; e._wlIds=wl.length?new Set(wl.map(a=>a.id)):null;
}

function boot(payload){
  const raw = (payload && payload.events) || [];
  PEOPLE = (payload && payload.people) || [];
  loadFriends(); loadMe(); loadViews();
  TODAY = todayKey();
  const resolve = idxs => (idxs||[]).map(i=>PEOPLE[i]).filter(Boolean).map(p=>({id:p[0], name:p[1]}));
  data = raw.map(e=>{
    const lv=levelTokensOf(e);
    const o=partsOf(e.start);                                   // one Intl call → derive dk, dow, and minutes
    let h=parseInt(o.hour,10)%12; if(o.dayPeriod==="PM") h+=12; // 12h → 24h (12AM→0, 12PM→12)
    const cap=e.capacity||0, signed=e.signedUp||0;
    const ev={...e, cat:classifyType(e), levelTokens:lv.tokens, isOpen:lv.isOpen,
      isWomen:/ladies|women|girls/i.test(e.name||"") || (e.tags||[]).includes("Women"),
      dk:o.year+"-"+o.month+"-"+o.day, mins:h*60+parseInt(o.minute,10), dow:DOWMAP[o.weekday],
      start_ms:new Date(e.start).getTime(), end_ms:new Date(e.end).getTime(),
      spotsLeft: cap ? Math.max(0,cap-signed) : null, full: cap ? signed>=cap : false};
    applyRoster(ev, resolve(e.att), resolve(e.wl));   // baked signups + waitlist → id sets + search names

  }).filter(e=>e.dk>=TODAY && signupWindowOpen(e)).sort((a,b)=>a.start_ms-b.start_ms);

  // time bounds from data
  const mm = data.map(e=>e.mins);
  T_FLOOR = data.length ? Math.floor(Math.min(...mm)/30)*30 : 360;

    emptyEl.innerHTML="<b>No upcoming sessions</b>Check back later — the club publishes its booking window a few weeks out."; return; }
  render();

  // first visit with no identity set → prompt for their name up front (once)
  try{
    if(!me && !localStorage.getItem("apex-podplay-onboarded")){
      localStorage.setItem("apex-podplay-onboarded","1");
      openPeople(true);
    }
  }catch(e){}
}

// ---- persistence ----
function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({
    types:[...state.types], levels:[...state.levels], days:[...state.days],
    tMin:state.tMin, tMax:state.tMax, view:state.view, openOnly:state.openOnly, friendsOnly:state.friendsOnly, mineOnly:state.mineOnly, women:state.women })); }catch(e){}
}
function loadState(){
  let s; try{ s=JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){ return; }
  if(!s || typeof s!=="object") return;   // each field below is validated against live data — stale values self-heal to defaults
  if(Array.isArray(s.types)){ const t=s.types.filter(k=>CATS[k]); if(t.length) state.types=new Set(t); }
  if(Array.isArray(s.levels)){ const ok=new Set(LEVEL_KEYS); let l=s.levels.filter(k=>ok.has(k)); if(l.includes("all")) l=["all"]; if(l.length) state.levels=new Set(l); }
  if(Array.isArray(s.days)){ const d=s.days.filter(x=>x>=0&&x<=6); if(d.length) state.days=new Set(d); }
  if(typeof s.tMin==="number") state.tMin=Math.min(Math.max(s.tMin,T_FLOOR),T_CEIL);
  if(typeof s.tMax==="number") state.tMax=Math.min(Math.max(s.tMax,T_FLOOR),T_CEIL);
  if(state.tMin>state.tMax){ state.tMin=T_FLOOR; state.tMax=T_CEIL; }
  if(s.view==="list"||s.view==="month") state.view=s.view;
  if(typeof s.openOnly==="boolean") state.openOnly=s.openOnly;
  if(typeof s.friendsOnly==="boolean") state.friendsOnly=s.friendsOnly;
  if(typeof s.mineOnly==="boolean") state.mineOnly=s.mineOnly;
  if(s.women==="only"||s.women==="none") state.women=s.women;
  else if(s.womenOnly===true) state.women="only";   // migrate the earlier boolean toggle
}

// ---- filtering ----
function matchesLevel(e){
  if(state.levels.has("all")) return true;              // "All" = no level filtering
  return e.levelTokens.some(t=>state.levels.has(t));
}
// everything except the type toggles (so type-chip counts stay meaningful)
function passNonType(e){
  return matchesLevel(e)
    && state.days.has(e.dow)
    && e.mins>=state.tMin && e.mins<=state.tMax
    && (!state.openOnly || e.spotsLeft===null || e.spotsLeft>0)
    && (!state.friendsOnly || friendCountIn(e)>0)
    && (!state.mineOnly || myStatus(e)!==null)
    && (state.women!=="only" || e.isWomen)
    && (state.women!=="none" || !e.isWomen)
    && (!state.search || e.name.toLowerCase().includes(state.search)
        || (e._attNames && e._attNames.some(n=>n.includes(state.search))));   // search matches session OR a player's name
}
// counts reflect the non-type filters (so each type chip shows how many it would add)
function updateCounts(base){
  const c={}; Object.keys(CATS).forEach(k=>c[k]=0);
  base.forEach(e=>c[e.cat]++);
  typeChips.querySelectorAll(".chip").forEach(b=>{
    const k=[...b.classList].find(x=>x.startsWith("c-")).slice(2);
    const cn=b.querySelector(".cn"); if(cn) cn.textContent=c[k];
  });
}

// toggle helper: never allow an empty set (empty ⇒ select all)

    state.levels.delete("all");
    if(state.levels.has(k)) state.levels.delete(k); else state.levels.add(k);

  const ms0=myStatus(e);
  const conflict=conflictEvent(e);
  const r=document.createElement("div"); r.className="row cat-"+e.cat+(ms0?(ms0.t==="in"?" mine":" minewl"):(conflict?" conflict":"")); r.onclick=()=>openSheet(e);
  const pct=pctFull(e);
  // your own ✓/◷ badge already says what matters — a red "Waitlist" next to "You're in" reads as a conflict
  const spots = (ms0 || e.spotsLeft===null) ? "" :
    (e.spotsLeft===0 ? '<span class="spots none">'+(e.full?"Waitlist":"Full")+'</span>'
                     : '<span class="spots'+(pct>=80||e.spotsLeft<=2?" low":"")+'">'+e.spotsLeft+' spot'+(e.spotsLeft===1?"":"s")+' left'+(e.signedUp?' · '+pct+'% full':'')+'</span>');
  const price = (e.regular && e.regular>0) ? '<span class="price num">$'+e.regular.toFixed(2).replace(/\.00$/,"")+'</span>' : '<span class="price">Free</span>';
  const fc=friendCountIn(e);
  const fbadge = fc ? '<span class="fbadge">★ '+fc+' friend'+(fc===1?"":"s")+'</span>' : "";
  const ms=ms0;
  const mbadge = ms ? (ms.t==="in" ? '<span class="mebadge">✓ You’re in</span>'
                                   : '<span class="mebadge wl">◷ Waitlist'+(ms.pos?" #"+ms.pos:"")+'</span>') : "";
  const cbadge = conflict ? '<span class="cbadge" title="You’re already booked for '+esc(conflict.name)+' at this time">⏱ Booked: '+esc(conflict.name)+'</span>' : "";
  r.innerHTML=
    '<div class="rtime num">'+timeLabelFull(e.start)+'<span>'+timeLabelFull(e.end)+'</span></div>'+
    '<div><div class="rname">'+e.name+'</div><div class="rmeta">'+
      '<span class="badge b-'+e.cat+'">'+CATS[e.cat].label+'</span>'+
      mbadge+fbadge+cbadge+'</div></div>'+
    '<div class="rright">'+price+spots+'</div>';
  let lbl=e.name+", "+timeLabelFull(e.start)+", "+CATS[e.cat].label+", "+availText(e);
  if(ms) lbl+=ms.t==="in"?", you’re registered":", you’re on the waitlist";
  if(fc) lbl+=", "+fc+" friend"+(fc===1?"":"s")+" going";
  if(conflict) lbl+=", you’re already booked for "+conflict.name+" at this time";
  r.setAttribute("aria-label", lbl);
  keyActivate(r);
  return r;
}
function renderList(){
  const list=curList; listEl.innerHTML=""; grid.hidden=true; monthbar.style.display="none";
  dayPanel.classList.remove("on"); dayPanel.innerHTML="";
  if(!list.length){ emptyEl.hidden=false; listEl.style.display="none";
    emptyEl.innerHTML="<b>No sessions match</b>"+(state.search
      ? "Nothing matches “"+esc(state.search)+"” — clear the search or widen your filters."
      : "Turn a filter back on, widen the time range, or reset."); return; }
  emptyEl.hidden=true; listEl.style.display="flex";
  const byDay={}; list.forEach(e=>(byDay[e.dk]=byDay[e.dk]||[]).push(e));
  Object.keys(byDay).sort().forEach(key=>{
    const evs=byDay[key]; const d=new Date(evs[0].start);
    const grp=document.createElement("div"); grp.className="daygrp"; grp.id="d-"+key;
    const hd=document.createElement("div"); hd.className="dayhd";
    hd.innerHTML='<span class="dd">'+d.toLocaleDateString("en-US",{timeZone:TZ,month:"long",day:"numeric"})+'</span>'+
                 '<span class="dw">'+d.toLocaleDateString("en-US",{timeZone:TZ,weekday:"long"})+'</span>'+
                 '<span class="dc num">'+evs.length+' session'+(evs.length===1?"":"s")+'</span>';
    grp.appendChild(hd);
    const rows=document.createElement("div"); rows.className="rows";
    evs.forEach(e=>rows.appendChild(rowEl(e)));
    grp.appendChild(rows); listEl.appendChild(grp);
  });
}

// ---- modal ----
let lastFocus=null, sheetEvent=null;
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function personLi(p){
  const on=friends.has(p.id), isme=!!(me&&me.id===p.id), nm=esc(p.name||"Member");
  const star = isme
    ? '<span class="star" aria-hidden="true"></span>'   // you can't follow yourself
    : '<button class="star" data-id="'+esc(p.id)+'" data-name="'+esc(p.name||"")+'" aria-pressed="'+(on?"true":"false")+'" aria-label="Follow '+nm+'">'+(on?"★":"☆")+'</button>';
  return '<li class="'+(isme?"isme ":"")+(on?"isfriend":"")+'">'+star
    +'<span class="pn">'+nm+'</span>'+(isme?'<span class="metag">You</span>':'')+'</li>';
}
function sortRoster(list){ return [...list].sort((a,b)=>{
  const ma=(me&&me.id===a.id)?1:0, mb=(me&&me.id===b.id)?1:0; if(ma!==mb) return mb-ma;
  const fa=friends.has(a.id)?1:0, fb=friends.has(b.id)?1:0; if(fa!==fb) return fb-fa;
  return String(a.name).localeCompare(String(b.name)); }); }
function rosterHtml(e){
  if(!e._att && !e._wl) return e.signedUp ? '<div class="roster" id="rosterBox"><div class="rhd">Who’s going</div><div class="unavail">Attendee list isn’t published for this session.</div></div>' : '<div class="roster" id="rosterBox"></div>';
  let h='<div class="roster" id="rosterBox">';
  if(e._att) h+='<div class="rhd">Who’s going · '+e._att.length+'</div><ul>'+sortRoster(e._att).map(personLi).join("")+'</ul>';
  if(e._wl)  h+='<div class="rhd wl">Waitlist · '+e._wl.length+'</div><ul>'+e._wl.map(personLi).join("")+'</ul>';   // keep waitlist order = position
  return h+'</div>';
}
function wireStars(){
  sheet.querySelectorAll(".star").forEach(btn=>{
    btn.onclick=()=>{
      toggleFriend(btn.dataset.id, btn.dataset.name);
      const on=friends.has(btn.dataset.id);
      btn.setAttribute("aria-pressed", on?"true":"false");
      btn.textContent=on?"★":"☆";
      btn.closest("li").classList.toggle("isfriend", on);
      syncFriendsUI(); render();   // refresh badges/counts behind the modal
    };
  });
}
function openPeople(onboarding){
  if(!scrim.classList.contains("open")) lastFocus=document.activeElement;
  const meBox = me
    ? '<div class="me-box"><div class="cur"><span>You: <span class="who">'+esc(me.name||"Member")+'</span></span>'
        +'<button class="mini" id="meChange">Change / clear</button></div></div>'
    : '<div class="me-box">'+(onboarding?"":'<div class="when" style="color:var(--muted)">Tell the app who you are to see what you’re registered for and your waitlist spots.</div>')
        +'<input class="me-search" id="meSearch" type="search" placeholder="Search your name…" aria-label="Search your name">'
        +'<ul class="me-results" id="meResults"></ul></div>';
  const entries=[...friends].sort((a,b)=>String(a[1]).localeCompare(String(b[1])));
  const fr = entries.length
    ? '<ul class="fr-list">'+entries.map(([id,name])=>'<li><span class="pn">'+esc(name||"Member")+'</span><button class="rm" data-id="'+esc(id)+'">Remove</button></li>').join("")+'</ul>'
    : '<div class="fr-empty">No friends yet. Open a session’s <b>Who’s going</b> list and tap a star to follow someone.</div>';
  const head = onboarding
    ? '<div class="cat" style="color:var(--mine)">Welcome</div><h3 id="sh-title">Who are you?</h3>'
      +'<div class="when">Search your name so the app can show what you’re registered for and your waitlist spots — or skip and just browse.</div>'
    : '<div class="cat" style="color:var(--mine)">You &amp; friends</div><h3 id="sh-title">You &amp; friends</h3>'
      +'<div class="when">Marks what you’re registered for, and flags friends’ sessions with a ★. Saved on this device only.</div>';
  sheet.innerHTML=
    '<div class="top">'+head+'</div>'+
    meBox+
    '<div class="roster"><div class="rhd">Friends ('+friends.size+')</div></div>'+
    fr+
    '<div class="foot"><button class="book" id="fdone">'+(onboarding?"Skip for now":"Done")+'</button><button class="close" id="x" aria-label="Close">×</button></div>';
  scrim.classList.add("open");
  document.getElementById("x").onclick=closeSheet;
  document.getElementById("fdone").onclick=closeSheet;
  sheet.querySelectorAll(".rm").forEach(btn=>{ btn.onclick=()=>{ friends.delete(btn.dataset.id); saveFriends(); syncFriendsUI(); render(); openPeople(); }; });
  const changeBtn=document.getElementById("meChange");
  if(changeBtn) changeBtn.onclick=()=>{ me=null; saveMe(); syncFriendsUI(); render(); openPeople(); };
  const meSearch=document.getElementById("meSearch");
  if(meSearch){
    const results=document.getElementById("meResults");
    const renderMatches=()=>{
      const q=meSearch.value.trim().toLowerCase(); results.innerHTML="";
      if(q.length<2) return;
      const matches=[];
      for(const [id,name] of PEOPLE){ if(name && name.toLowerCase().includes(q)){ matches.push([id,name]); if(matches.length>=8) break; } }
      results.innerHTML = matches.length
        ? matches.map(([id,name])=>'<li><span class="pn">'+esc(name)+'</span><button class="pick" data-id="'+esc(id)+'" data-name="'+esc(name)+'">This is me</button></li>').join("")
        : '<li class="unavail">No players match. You must have signed up for a recent session to appear here.</li>';
      results.querySelectorAll(".pick").forEach(b=>{ b.onclick=()=>{ me={id:b.dataset.id,name:b.dataset.name}; if(friends.delete(me.id)) saveFriends(); saveMe(); syncFriendsUI(); render(); openPeople(); }; });
    };
    meSearch.addEventListener("input", renderMatches);
    setTimeout(()=>meSearch.focus(),0);
  }
  document.getElementById("x").focus();
}
function openSheet(e){
  if(!scrim.classList.contains("open")) lastFocus=document.activeElement;
  sheetEvent=e;
  const d=new Date(e.start);
  const dateStr=d.toLocaleDateString("en-US",{timeZone:TZ,weekday:"long",month:"long",day:"numeric"});
  const price = (e.regular&&e.regular>0)
    ? '$'+e.regular.toFixed(2).replace(/\.00$/,"")+' drop-in'+(e.member?' <span class="hint">· $'+e.member.toFixed(2).replace(/\.00$/,"")+' member</span>':'')
    : 'Free';
  const conflict=conflictEvent(e);
  const conflictNote = conflict
    ? '<div class="conflictnote">⏱ <span>You’re already booked for <b>'+esc(conflict.name)+'</b> ('+timeLabelFull(conflict.start)+'–'+timeLabelFull(conflict.end)+') at this same time.</span></div>'
    : '';
  sheet.innerHTML=
    '<div class="top">'+
      '<div class="cat" style="color:'+CATS[e.cat].color+'">'+CATS[e.cat].label+'</div>'+
      '<h3 id="sh-title">'+e.name+'</h3>'+
      '<div class="when num">'+dateStr+' · '+timeLabelFull(e.start)+' – '+timeLabelFull(e.end)+'</div>'+
    '</div>'+
    conflictNote+
    '<div class="body">'+
      drow("Skill",(ratingText(e)==="Open"?"Open":"Level "+ratingText(e))+' <span class="hint">· Doubles</span>')+
      drow("Price", price)+
      drow("Availability", '<div id="availWrap"><span id="availVal">'+availText(e)+'</span>'+meterHtml(e)+'</div>')+
    '</div>'+
    rosterHtml(e)+
    '<div class="foot">'+
      '<a class="book" href="'+BOOK(e.id)+'" target="_blank" rel="noopener">Book on PodPlay →</a>'+
      '<button class="close" id="x" aria-label="Close">×</button>'+
    '</div>'+
    '<div class="note">Opens the session on apexpbclubs.podplay.app · a PodPlay account is required to reserve.</div>';
  scrim.classList.add("open");
  wireStars();
  document.getElementById("x").onclick=closeSheet;
  document.getElementById("x").focus();
  // live-refresh this session's roster so your status / who's going is exact-now
  if(e.signedUp && !e._live){
    const hd=sheet.querySelector("#rosterBox .rhd");
    if(hd) hd.insertAdjacentHTML("beforeend",' <span class="livehint">updating…</span>');
    refreshRoster(e).then(ok=>{
      if(sheetEvent!==e || !scrim.classList.contains("open")) return;
      if(ok){
        const box=sheet.querySelector("#rosterBox");
        if(box){ box.outerHTML=rosterHtml(e); wireStars(); }   // fresh roster markup drops the hint too
        const av=sheet.querySelector("#availWrap");   // live spots/waitlist + fullness meter
        if(av) av.innerHTML='<span id="availVal">'+availText(e)+'</span>'+meterHtml(e);
        render();   // refresh badges/counts behind the modal
      } else {
        const h=sheet.querySelector(".livehint"); if(h) h.remove();   // refresh failed → baked data stands
      }
    });
  }
}
function drow(k,v){ return '<div class="drow"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>'; }
function closeSheet(){ scrim.classList.remove("open"); sheetEvent=null; if(lastFocus)lastFocus.focus(); }

// ---- view + wiring ----
function syncView(){
  document.getElementById("v-month").setAttribute("aria-pressed", state.view==="month");
  document.getElementById("v-list").setAttribute("aria-pressed", state.view==="list");
}
function wire(){
  syncView();
  document.getElementById("v-month").onclick=()=>{state.view="month";syncView();saveState();render();};
  document.getElementById("v-list").onclick=()=>{state.view="list";syncView();saveState();render();};
  document.getElementById("prev").onclick=()=>{const i=months.indexOf(state.month.y+"-"+String(state.month.m).padStart(2,"0"));if(i>0){setMonth(months[i-1]);render();}};
  document.getElementById("next").onclick=()=>{const i=months.indexOf(state.month.y+"-"+String(state.month.m).padStart(2,"0"));if(i<months.length-1){setMonth(months[i+1]);render();}};
  document.getElementById("reset").onclick=resetFilters;
  searchEl.value=state.search;
  let searchT;
  searchEl.addEventListener("input",()=>{   // debounced; transient, not persisted
    clearTimeout(searchT);
    searchT=setTimeout(()=>{ state.search=searchEl.value.trim().toLowerCase(); render(); }, 140);
  });
  openOnlyBtn.setAttribute("aria-pressed", state.openOnly?"true":"false");
  openOnlyBtn.onclick=()=>{ state.openOnly=!state.openOnly; openOnlyBtn.setAttribute("aria-pressed", state.openOnly?"true":"false"); saveState(); render(); };
  syncWomen();
  [...womenSeg.children].forEach(b=>{ b.onclick=()=>{ state.women=b.dataset.w; syncWomen(); saveState(); render(); }; });
  friendsOnlyBtn.onclick=()=>{ state.friendsOnly=!state.friendsOnly; friendsOnlyBtn.setAttribute("aria-pressed", state.friendsOnly?"true":"false"); saveState(); render(); };
  mineOnlyBtn.onclick=()=>{ if(!me){ openPeople(); return; } state.mineOnly=!state.mineOnly; mineOnlyBtn.setAttribute("aria-pressed", state.mineOnly?"true":"false"); saveState(); render(); };
  manageFriendsBtn.onclick=()=>openPeople();
  filtToggle.onclick=()=>setFiltersOpen(!controlsEl.classList.contains("open"));
  filtDoneBtn.onclick=()=>setFiltersOpen(false);
  syncFriendsUI();
  scrim.onclick=ev=>{ if(ev.target===scrim) closeSheet(); };
  document.addEventListener("keydown",ev=>{
    if(ev.key==="Escape" && document.body.classList.contains("filters-open")){ setFiltersOpen(false); return; }
    if(!scrim.classList.contains("open")) return;
    if(ev.key==="Escape"){ closeSheet(); return; }
    if(ev.key==="Tab"){   // trap focus inside the dialog
      const f=[...sheet.querySelectorAll('a[href],button,input,select,textarea,[tabindex]:not([tabindex="-1"])')].filter(el=>!el.disabled && el.offsetParent!==null);
      if(!f.length) return;
      const first=f[0], last=f[f.length-1];
      if(ev.shiftKey && document.activeElement===first){ ev.preventDefault(); last.focus(); }
      else if(!ev.shiftKey && document.activeElement===last){ ev.preventDefault(); first.focus(); }
    }
  });
  MQ.addEventListener("change",()=>{ selDays=new Set(); defaultedMonth=null; setFiltersOpen(false); render(); });   // re-render when crossing the mobile breakpoint; the modal is mobile-only
}
// mobile: filters open as a full-screen modal that covers the hero + content
function setFiltersOpen(open){
  controlsEl.classList.toggle("open", open);
  filtToggle.setAttribute("aria-expanded", open?"true":"false");
  document.body.classList.toggle("filters-open", open);
  if(open) window.scrollTo(0,0);
}
function resetFilters(){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  state.types=new Set(Object.keys(CATS)); state.levels=new Set(["all"]);
  state.days=new Set([0,1,2,3,4,5,6]); state.tMin=T_FLOOR; state.tMax=T_CEIL; state.view="month";
  state.openOnly=false; state.friendsOnly=false; state.mineOnly=false; state.women="all"; state.search="";
  tmin.value=T_FLOOR; tmax.value=T_CEIL; searchEl.value="";
  openOnlyBtn.setAttribute("aria-pressed","false"); friendsOnlyBtn.setAttribute("aria-pressed","false"); mineOnlyBtn.setAttribute("aria-pressed","false");
  syncPressed(typeChips,"c-",state.types); syncLevels(); syncDow(); syncWomen(); updateRangeUI(); syncView();
  render();   // note: does not clear your identity (me) or friends list
}

// ---- PWA: install + offline ----
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
